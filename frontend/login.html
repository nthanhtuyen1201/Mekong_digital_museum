<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập | Bảo tàng Số Tây Nam Bộ</title>
    <link rel="stylesheet" href="css/login.css" />
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🏛️ MuseMap<br><span>BẢO TÀNG SỐ TÂY NAM BỘ</span></h1>
            <p class="subtitle">Đăng nhập Quản trị viên</p>

            <form id="loginForm" autocomplete="off">
                <input type="text" id="username" placeholder="Tên đăng nhập" required />

                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Mật khẩu" required />
                    <button type="button" id="togglePassword" aria-label="Hiện mật khẩu"></button>
                </div>

                <button type="submit" id="loginBtn">Đăng nhập</button>
                <div class="loading" id="loadingSpinner"></div>
                <p id="loginMsg" class="message"></p>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
